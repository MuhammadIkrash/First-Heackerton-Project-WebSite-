
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpHub AI | Request Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="logo-box">H</span>
      <span class="logo-text">HelpHub AI</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="explore.html" class="nav-link">Explore</a>
      <a href="messages.html" class="nav-link">Messages</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <p class="eyebrow-light">REQUEST DETAIL</p>
    <div class="tags-row" id="reqTags" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;"></div>
    <h1 id="reqTitle">Loading…</h1>
    <p id="reqDesc" style="margin-top:12px;"></p>
  </div>
</div>

<div class="page-content">
  <div class="page-inner">
    <div class="request-detail-layout">

      <!-- LEFT -->
      <div style="display:flex;flex-direction:column;gap:20px;">

        <div class="card">
          <div class="card-eyebrow">AI SUMMARY</div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
            <div class="logo-box" style="width:36px;height:36px;font-size:14px;flex-shrink:0;">H</div>
            <span style="font-weight:700;font-size:14px;">HelpHub AI</span>
          </div>
          <p id="reqSummary" style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px;"></p>
          <div class="request-tags" id="reqSummaryTags"></div>
        </div>

        <div class="card">
          <div class="card-eyebrow">ACTIONS</div>
          <div class="actions-row">
            <button class="btn-sm teal" onclick="iCanHelp()">I can help</button>
            <button class="btn-sm" onclick="markSolved()">Mark as solved</button>
          </div>
        </div>

      </div>

      <!-- RIGHT -->
      <div style="display:flex;flex-direction:column;gap:20px;">

        <div class="card">
          <div class="card-eyebrow">REQUESTER</div>
          <div id="requesterCard" style="display:flex;align-items:center;gap:12px;padding:8px 0;">
            <!-- JS populated -->
          </div>
        </div>

        <div class="card">
          <div class="card-eyebrow">HELPERS</div>
          <h3 style="font-size:18px;font-weight:800;margin-bottom:16px;">People ready to support</h3>
          <div id="reqHelpers"></div>
        </div>

        <a href="messages.html" class="btn-teal" style="text-align:center;display:block;">Message a helper</a>
        <a href="explore.html" class="btn-outline" style="text-align:center;display:block;">← Back to feed</a>

      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  renderRequestDetail();

  // Populate requester
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id')) || 1;
  const req = REQUESTS.find(r => r.id === id) || REQUESTS[0];
  const author = USERS.find(u => u.name === req.author) || USERS[0];
  document.getElementById('requesterCard').innerHTML = `
    <div class="helper-avatar" style="background:${author.color};width:40px;height:40px;">${author.initials}</div>
    <div>
      <div style="font-weight:700;font-size:14px;">${author.name}</div>
      <div style="font-size:12px;color:var(--muted);">${author.role} • ${author.location}</div>
    </div>
  `;
</script>
</body>
</html>
